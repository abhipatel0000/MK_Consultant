<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | M K Consultant</title>
  <link rel="stylesheet" href="../assets/css/admin.css">  
  <link rel="icon" type="image/jpeg" href="../assets/images/MK_Consultant.jpeg">
</head>
<body class="login-body">

  <div class="login-card">
    <div class="login-header">
      <h2>M K <span style="color: var(--accent-cyan);">CONSULTANT</span></h2>
      <p>Management & Analytics Console</p>
    </div>

    <div id="loginAlert"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-input" placeholder="admin@mkconsultant.in" required>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 12px; margin-top: 10px;" id="loginBtn">Log In</button>
    </form>
  </div>

  <script src="js/admin-auth.js"></script>
</body>
</html>
